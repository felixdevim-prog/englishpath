<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Mastery PRO</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0A0A0F">
<link rel="apple-touch-icon" href="https://raw.githubusercontent.com/felixdevim-prog/englishpath/main/english.png">

<style>

body{
  margin:0;
  background:#0A0A0F;
  color:#e8e8ed;
  font-family:Inter,Arial;
}

/* 👇 PEGA ESTO AQUÍ */
p, span, div, h1, h2, h3, h4, label {
  color: #e8e8ed;
}

input {
  color: #e8e8ed;
}

/* tus otros estilos siguen abajo */
.container{max-width:900px;margin:auto;padding:20px}
.card{background:#111119;border:1px solid #1e1e2e;padding:16px;border-radius:14px;margin-bottom:12px}








  
body{margin:0;background:#0A0A0F;color:#e8e8ed;font-family:Inter,Arial}
.container{max-width:900px;margin:auto;padding:20px}
h1{color:#06B6D4}
.card{background:#111119;border:1px solid #1e1e2e;padding:16px;border-radius:14px;margin-bottom:12px}
.phase-btn{padding:10px;border-radius:10px;border:1px solid #1e1e2e;background:#111119;color:#888;cursor:pointer}
.phase-btn.active{border-color:#06B6D4;color:#06B6D4}
button.install{background:#06B6D4;border:none;padding:12px;border-radius:10px;color:#000;font-weight:bold;cursor:pointer;width:100%}
.progress{height:6px;background:#1e1e2e;border-radius:4px;overflow:hidden;margin-top:10px}
.progress-bar{height:100%;background:linear-gradient(90deg,#06B6D4,#8B5CF6);width:0%}
.check{cursor:pointer;margin-right:8px}
</style>
</head>
<body>

<div class="container">
<h1>English Mastery PRO</h1>
<p>A2 → C1 en 10 meses</p>

<div id="phases"></div>

<div class="card">
<h3>Progreso</h3>
<div class="progress"><div id="bar" class="progress-bar"></div></div>
<p id="progressText"></p>
</div>

<button class="install" onclick="installApp()">Instalar App</button>
</div>

<script>
const phasesData=[
{title:"Fase 1: Cimientos",tasks:["Busuu diario","20 palabras","Anki","Listening","Hablar con IA"]},
{title:"Fase 2: Despegue",tasks:["B1 Busuu","Podcasts","Conversación","Coursera","Series en inglés"]},
{title:"Fase 3: Aceleración",tasks:["B2","Entrevistas","Writing","Podcasts avanzados","Trabajo simulado"]},
{title:"Fase 4: Dominio",tasks:["Inmersión total","Shadowing","Debates","Emails","Nivel nativo"]}
];

let progress=JSON.parse(localStorage.getItem('progress')||"{}");

function render(){
const container=document.getElementById('phases');
container.innerHTML='';
let total=0,done=0;

phasesData.forEach((phase,i)=>{
const div=document.createElement('div');
div.className='card';

div.innerHTML=`<h2>${phase.title}</h2>`;

phase.tasks.forEach((t,j)=>{
const id=`p${i}_${j}`;
if(progress[id]) done++;
total++;

const row=document.createElement('div');
row.innerHTML=`
<input type="checkbox" class="check" ${progress[id]?"checked":""} onclick="toggle('${id}')">
${t}`;
div.appendChild(row);
});

container.appendChild(div);
});

let percent=Math.round((done/total)*100)||0;
document.getElementById('bar').style.width=percent+'%';
document.getElementById('progressText').innerText=percent+"% completado";
}

function toggle(id){
progress[id]=!progress[id];
localStorage.setItem('progress',JSON.stringify(progress));
render();
}

render();

// INSTALL
let deferredPrompt;
window.addEventListener('beforeinstallprompt',e=>{
e.preventDefault();
deferredPrompt=e;
});

function installApp(){
if(deferredPrompt){
deferredPrompt.prompt();
}
}

// SERVICE WORKER
if('serviceWorker' in navigator){
navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
