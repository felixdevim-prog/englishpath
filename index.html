<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Mastery PRO</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0A0A0F">
<link rel="apple-touch-icon" href="https://raw.githubusercontent.com/felixdevim-prog/englishpath/main/english.png">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:linear-gradient(180deg,#0A0A0F,#050507);
  color:#e8e8ed;
  font-family:'Inter',sans-serif;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

h1{
  font-size:28px;
  font-weight:800;
  color:#06B6D4;
  margin-bottom:5px;
}

p{
  color:#a0a0b0;
}

.card{
  background:rgba(255,255,255,0.03);
  backdrop-filter: blur(12px);
  border:1px solid rgba(255,255,255,0.05);
  padding:18px;
  border-radius:18px;
  margin-bottom:14px;
  box-shadow:0 10px 25px rgba(0,0,0,0.4);
  transition:0.25s;
}

.card:hover{
  transform:translateY(-3px);
  border-color:#06B6D4;
}

h2{
  font-size:18px;
  margin-bottom:10px;
}

.task{
  display:flex;
  align-items:center;
  gap:10px;
  padding:8px;
  border-radius:10px;
  transition:0.2s;
}

.task:hover{
  background:rgba(255,255,255,0.05);
}

input[type="checkbox"]{
  width:18px;
  height:18px;
  accent-color:#06B6D4;
  cursor:pointer;
}

.progress-box{
  margin-top:10px;
}

.progress{
  height:8px;
  background:#1e1e2e;
  border-radius:6px;
  overflow:hidden;
}

.progress-bar{
  height:100%;
  background:linear-gradient(90deg,#06B6D4,#8B5CF6);
  width:0%;
  transition:0.4s;
}

button.install{
  margin-top:20px;
  background:linear-gradient(135deg,#06B6D4,#8B5CF6);
  border:none;
  padding:14px;
  border-radius:14px;
  color:white;
  font-weight:700;
  cursor:pointer;
  width:100%;
  font-size:15px;
  box-shadow:0 10px 20px rgba(6,182,212,0.3);
  transition:0.25s;
}

button.install:hover{
  transform:scale(1.03);
}

.header{
  margin-bottom:20px;
}

</style>
</head>
<body>

<div class="container">

<div class="header">
<h1>English Mastery</h1>
<p>A2 → C1 roadmap inteligente</p>
</div>

<div id="phases"></div>

<div class="card">
<h2>📊 Progreso</h2>
<div class="progress-box">
<div class="progress"><div id="bar" class="progress-bar"></div></div>
<p id="progressText"></p>
</div>
</div>

<button class="install" onclick="installApp()">📲 Instalar App</button>

</div>

<script>
const phasesData=[
{title:"🧱 Fase 1: Cimientos",tasks:["Busuu diario","20 palabras","Anki","Listening","Hablar con IA"]},
{title:"🚀 Fase 2: Despegue",tasks:["B1 Busuu","Podcasts","Conversación","Coursera","Series en inglés"]},
{title:"⚡ Fase 3: Aceleración",tasks:["B2","Entrevistas","Writing","Podcasts avanzados","Trabajo simulado"]},
{title:"👑 Fase 4: Dominio",tasks:["Inmersión total","Shadowing","Debates","Emails","Nivel nativo"]}
];

let progress=JSON.parse(localStorage.getItem('progress')||"{}");

function render(){
const container=document.getElementById('phases');
container.innerHTML='';
let total=0,done=0;

phasesData.forEach((phase,i)=>{
const div=document.createElement('div');
div.className='card';

div.innerHTML=`<h2>${phase.title}</h2>`;

phase.tasks.forEach((t,j)=>{
const id=`p${i}_${j}`;
if(progress[id]) done++;
total++;

const row=document.createElement('div');
row.className='task';
row.innerHTML=`
<input type="checkbox" ${progress[id]?"checked":""} onclick="toggle('${id}')">
<span>${t}</span>`;

div.appendChild(row);
});

container.appendChild(div);
});

let percent=Math.round((done/total)*100)||0;
document.getElementById('bar').style.width=percent+'%';
document.getElementById('progressText').innerText=percent+"% completado";
}

function toggle(id){
progress[id]=!progress[id];
localStorage.setItem('progress',JSON.stringify(progress));
render();
}

render();

let deferredPrompt;
window.addEventListener('beforeinstallprompt',e=>{
e.preventDefault();
deferredPrompt=e;
});

function installApp(){
if(deferredPrompt){
deferredPrompt.prompt();
}
}

if('serviceWorker' in navigator){
navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
